[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "tts-tokens-that-suffice"
version = "0.1.0"
requires-python = ">=3.11, <3.14"
dependencies = [
    "tinker-cookbook>=0.4.2",
    "skyrl[tinker]>=0.2.0",
    "torch==2.8.0",
    "flash-attn @ https://github.com/Dao-AILab/flash-attention/releases/download/v2.8.3.post1/flash_attn-2.8.3.post1+cu12torch2.8cxx11abiTRUE-cp313-cp313-linux_x86_64.whl",
]

[project.optional-dependencies]
tinker = []
fsdp = [
    # skyrl[skyrl-train] deps; vllm-router/nixl excluded
    "ray==2.51.1",
    "loguru",
    "tqdm",
    "ninja",
    "tensorboard",
    "func_timeout",
    "hydra-core==1.3.2",
    "accelerate",
    "torchdata",
    "omegaconf",
    "peft",
    "debugpy==1.8.0",
    "hf_transfer",
    "wandb",
    "datasets>=4.0.0",
    "tensordict",
    "jaxtyping",
    "skyrl-gym==0.3.0",
    "polars",
    "s3fs",
    "fastapi",
    "uvicorn",
    "pybind11",
    "setuptools",
    "vllm-router",
    # vllm conflicts with skyrl on transformers; install manually:
    #   uv pip install vllm==0.19.1 --no-deps
]
dev = [
    "pytest",
    "ruff",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.uv]
environments = ["sys_platform == 'linux'"]
override-dependencies = [
    "torch==2.8.0",
    "torchaudio==2.8.0",
    "torchvision==0.23.0",
]

[tool.uv.sources]
torch = { index = "pytorch-cu128" }
torchvision = { index = "pytorch-cu128" }
torchaudio = { index = "pytorch-cu128" }

[[tool.uv.index]]
name = "pytorch-cu128"
url = "https://download.pytorch.org/whl/cu128"
explicit = true
